name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck, test, and bundle
        run: npm run package
      - name: Extension Host integration test
        run: xvfb-run -a npm run test:integration
      - name: Package dogfooding VSIX
        run: npx --yes @vscode/vsce@3.9.2 package --no-dependencies --out "Totonoe-Knowledge-${{ github.sha }}.vsix"
      - name: Upload dogfooding VSIX
        uses: actions/upload-artifact@v4
        with:
          name: totonoe-knowledge-vsix-${{ github.sha }}
          path: Totonoe-Knowledge-${{ github.sha }}.vsix
          if-no-files-found: error
          retention-days: 14
